<!DOCTYPE html>
<html>
  <head>
    <title>町丁目ポリゴンをベクトルタイルで表示する</title>
    <script src="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@3.0.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="map" style="height: 90vh"></div>
    <script>
      // MapLibre地図インスタンスの初期化
      const map = new maplibregl.Map({
        container: "map",
        center: [139.66204291, 35.67260863], // 初期中心位置
        zoom: 11,
        style: {
          version: 8,
          sources: {
            // 背景地図ソースの定義（OSMを利用）
            osm: {
              type: "raster", // ラスタータイル
              tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
              tileSize: 256, // タイルの解像度
              maxzoom: 18,
              attribution:
                '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            },
          },
          layers: [
            // 背景地図レイヤーの定義
            {
              id: "osm-layer",
              source: "osm",
              type: "raster",
            },
          ],
        },
      });

      // MapLibre地図ロード時の処理
      map.on("load", function () {
        // ベクトルタイルをソースに追加
        map.addSource("mvt_data", {
          type: "vector",
          // URLはserver.jsの仕様に合わせ、町丁目をテーブル名で指定
          tiles: [
            "http://localhost:3000/api/map/pattern/{z}/{x}/{y}"
            // "http://localhost:3000/tiles/{z}/{x}/{y}?name=chomoku_polygons",
          ],
        });
        // ポリゴンの塗りつぶしレイヤー追加
        map.addLayer({
          id: "mvt_data",
          type: "fill",
          source: "mvt_data",
          "source-layer": "mvt_polygons", // server.jsで決めている名前を指定
          layout: {},
          paint: {
            "fill-color": "#2d2d70",
            "fill-opacity": 0.3,
          },
        });
        // ポリゴンのラインレイヤー追加
        map.addLayer({
          id: "mvt_data_line",
          type: "line",
          source: "mvt_data",
          "source-layer": "mvt_polygons", // server.jsで決めている名前を指定
          layout: {},
          paint: {
            "line-color": "#2d2d70",
            "line-width": 0.7,
          },
        });
      });
    </script>
  </body>
</html>
