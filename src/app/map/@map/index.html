<!DOCTYPE html>
<html lang="jp" style="width: 100%; height: 100%;">
<head>
  <title>test</title>
  <meta charset='utf-8'>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel='stylesheet' href='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.css' />
  <script src='https://unpkg.com/maplibre-gl@5.13.0/dist/maplibre-gl.js'></script>
</head>
<body style="width: 100%; height: 100%; margin: 0;">
  <div id="map" style="width: 100%; height: 100%;">
  </div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://raw.githubusercontent.com/gsi-cyberjapan/optimal_bvmap/52ba56f645334c979998b730477b2072c7418b94/style/std.json',
      center: [139.50, 35.69],
      zoom: 13
    });

    map.on('load', () => {
      maplibregl.addProtocol('custom', async (params) => {
        try {
          
          const url = params.url.replace('custom://api/', '');
          const t = await fetch(`http://127.0.0.1:3000/api/${url}`, {
            method: 'GET',
            headers: {
              // 'Access-Control-Allow-Headers': 'Content-Type',
              // 'Content-Type': 'application/vnd.mapbox-vector-tile'
            }
          });
          const buffer = await t.arrayBuffer();
          return {data: buffer}
        } catch (_e) {
          throw new Error(`Tile fetch error`);
        }
      })
      map.addSource('stationSource', {
        type: 'vector',
        tiles: ['custom://api/map/stations/{z}/{x}/{y}'],
        minzoom: 0,
        maxzoom: 14
      });

      map.addLayer({
        id: 'stationLayer',
        type: 'fill',
        source: 'stationSource',
        'source-layer': 'stationLayer',
        paint: {
          'fill-color': '#ff0000',
          'fill-opacity': 0.5
        }
      });

      map.addLayer({
        id: 'stationStrLayer',
        type: 'symbol',
        source: 'stationSource',
        'source-layer': 'stationLayer',
        'layout': {
          'icon-image': '',
          'text-font': ['NotoSansCJKjp-Regular'],
          'text-anchor': 'center',
          'text-allow-overlap': true,
          'text-size': 12,
          // 'text-size': ['interpolate',['linear'],['zoom'],5,8,8,11,15,18], 
          'text-offset': [0,0],
          'text-ignore-placement': true,
          'text-overlap': 'always',
          // 'text-field': '{station_name}',
          'text-field': ['get', 'station_name'],
        },
        'paint':{
          'text-color': '#555',
          'text-halo-color': '#fff',
          'text-halo-width': 1
        }
      });

    });
  </script>
</body>

</html>
